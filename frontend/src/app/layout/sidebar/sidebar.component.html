<div class="brand">
  <span class="brand__icon">
    <mat-icon>eco</mat-icon>
  </span>

  <span>AgroSales</span>
</div>

<nav aria-label="Navegação principal">
  @for (
    item of items();
    track item.route
  ) {
    <a
      mat-list-item
      [routerLink]="item.route"
      routerLinkActive="active"
    >
      <mat-icon matListItemIcon>
        {{ item.icon }}
      </mat-icon>

      <span matListItemTitle>
        {{ item.label }}
      </span>
    </a>
  }
</nav>
